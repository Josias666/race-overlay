<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Race Overlay</title>
    <link rel="stylesheet" href="/css/control.css">
</head>
<body>
    <div class="control-panel">
        
        <header class="control-header">
            <h1>🏃 PANEL DE CONTROL</h1>
            <div class="connection-status" id="connection-status">
                <span class="status-dot"></span>
                Conectado
            </div>
        </header>

        <div class="main-grid">
            
            <!-- Sección de Cronómetros -->
            <section class="panel-section">
                <h2>⏱️ Cronómetros</h2>
                
                <div class="category-control" data-category="10K">
                    <div class="cat-header">
                        <span class="cat-title cat-10k">10K</span>
                        <span class="cat-timer" id="control-timer-10k">00:00:00</span>
                    </div>
                    <div class="cat-actions">
                        <button class="btn btn-start" onclick="startCategory('10K')">▶ INICIAR</button>
                        <button class="btn btn-stop" onclick="stopCategory('10K')">⏹ DETENER</button>
                        <button class="btn btn-reset" onclick="resetCategory('10K')">↺ RESET</button>
                    </div>
                    <div class="cat-status" id="status-10k">ESPERANDO</div>
                </div>

                <div class="category-control" data-category="5K">
                    <div class="cat-header">
                        <span class="cat-title cat-5k">5K</span>
                        <span class="cat-timer" id="control-timer-5k">00:00:00</span>
                    </div>
                    <div class="cat-actions">
                        <button class="btn btn-start k5" onclick="startCategory('5K')">▶ INICIAR</button>
                        <button class="btn btn-stop" onclick="stopCategory('5K')">⏹ DETENER</button>
                        <button class="btn btn-reset" onclick="resetCategory('5K')">↺ RESET</button>
                    </div>
                    <div class="cat-status" id="status-5k">ESPERANDO</div>
                </div>
            </section>

            <!-- Registro de Llegadas -->
            <section class="panel-section">
                <h2>🏁 Registrar Llegada</h2>
                
                <form class="finish-form" id="finish-form" onsubmit="registerFinish(event)">
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="finish-category" required>
                            <option value="">Seleccionar...</option>
                            <option value="10K">10K</option>
                            <option value="5K">5K</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Número de Dorsal</label>
                        <input type="number" id="finish-bib" placeholder="Ej: 123" required min="1">
                    </div>
                    
                    <div class="form-group">
                        <label>Nombre (opcional)</label>
                        <input type="text" id="finish-name" placeholder="Nombre del corredor">
                    </div>
                    
                    <button type="submit" class="btn btn-finish">🏁 REGISTRAR LLEGADA</button>
                </form>

                <div class="quick-actions">
                    <h3>Acciones Rápidas</h3>
                    <button class="btn btn-secondary" onclick="testFinish()">🧪 Simular Llegada</button>
                    <button class="btn btn-secondary" onclick="clearLast()">↩ Deshacer Último</button>
                </div>
            </section>

            <!-- Resultados en Vivo -->
            <section class="panel-section full-width">
                <h2>📊 Resultados en Vivo</h2>
                
                <div class="results-tabs">
                    <button class="tab-btn active" onclick="showTab('all')">Todos</button>
                    <button class="tab-btn" onclick="showTab('10K')">10K</button>
                    <button class="tab-btn" onclick="showTab('5K')">5K</button>
                </div>

                <div class="results-table-container">
                    <table class="results-table" id="results-table">
                        <thead>
                            <tr>
                                <th>Pos</th>
                                <th>Dorsal</th>
                                <th>Nombre</th>
                                <th>Cat</th>
                                <th>Tiempo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="results-body">
                            <tr class="empty-row">
                                <td colspan="6">Sin resultados registrados</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="export-actions">
                    <button class="btn btn-secondary" onclick="exportCSV()">📥 Exportar CSV</button>
                    <button class="btn btn-danger" onclick="clearAll()">🗑 Limpiar Todo</button>
                </div>
            </section>

            <!-- Configuración -->
            <section class="panel-section">
                <h2>⚙️ Configuración</h2>
                
                <div class="form-group">
                    <label>Nombre del Evento</label>
                    <input type="text" id="event-name-input" placeholder="Carrera Pedestre 11K">
                    <button class="btn btn-secondary" onclick="updateEventName()">Actualizar</button>
                </div>

                <div class="info-box">
                    <h4>📺 URL para vMix:</h4>
                    <code id="vmix-url">http://localhost:3000</code>
                    <button class="btn btn-small" onclick="copyUrl()">Copiar</button>
                </div>
            </section>

        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/control.js"></script>
</body>
</html>
